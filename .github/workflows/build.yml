name: build

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        shell: bash
        run: |
          go vet ./...
          go build -ldflags="-s -w -H windowsgui" -o fastzapret-gui.exe .
          go build -ldflags="-s -w" -o fastzapret-cli.exe .

      - name: Package bundle
        shell: bash
        run: |
          mkdir -p dist/FastZapret
          cp -r bin lists configs dist/FastZapret/
          cp general.bat "Le Mans Ultimate.bat" fastzapret-gui.exe fastzapret-cli.exe README.md dist/FastZapret/
          cp scripts/*.bat scripts/*.ps1 dist/FastZapret/ 2>/dev/null || true
          cd dist && 7z a -tzip ../FastZapret.zip FastZapret >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: FastZapret
          path: FastZapret.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: FastZapret.zip
          generate_release_notes: true
