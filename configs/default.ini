# FastZapret — конфигурация
# Меняется здесь или прямо в веб-UI (127.0.0.1:7890).

# Набор стратегий: default | alt | alt2 | alt3
# Если один вариант не пробивает твоего провайдера — пробуй следующий.
strategy = default

# Профиль Le Mans Ultimate (Cloudflare + Hetzner, мягкий desync).
# true — если нужен онлайн LMU.
lemans = false

# LMU: ловить широкий диапазон портов (1024-65535) вместо точных портов игры.
# Медленнее (больше трафика через user-space), нужно только для серверов
# с нестандартными портами. По умолчанию выключено — так быстрее и без лагов.
lemans_wide = false

# Веб-UI
ui = 127.0.0.1:7890
open_ui = true

# Запускать движок сразу при старте приложения
autostart = true
