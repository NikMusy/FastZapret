# FastZapret — конфигурация
# Меняется здесь или прямо в веб-UI (127.0.0.1:7890).

# Набор стратегий: default | alt | alt2 | alt3
# Если один вариант не пробивает твоего провайдера — пробуй следующий.
strategy = default

# Профиль Le Mans Ultimate (Cloudflare + Hetzner, мягкий desync).
# true — если нужен онлайн LMU.
lemans = false

# Веб-UI
ui = 127.0.0.1:7890
open_ui = true

# Запускать движок сразу при старте приложения
autostart = true
